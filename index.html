<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Room Planner</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
    --bg: #fcfcfc;
    --surface: #ffffff;
    --surface-hover: #f7f7f7;
    --border: #ececec;
    --border-strong: #d4d4d4;
    --text: #0a0a0a;
    --text-secondary: #666;
    --text-tertiary: #999;
    --accent: #0a0a0a;
    --accent-soft: rgba(10, 10, 10, 0.04);
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
    --shadow: 0 2px 8px rgba(0,0,0,0.04), 0 1px 3px rgba(0,0,0,0.06);
    --shadow-lg: 0 12px 40px rgba(0,0,0,0.08), 0 4px 12px rgba(0,0,0,0.04);
    --ease: cubic-bezier(0.32, 0.72, 0, 1);
}

html, body { height: 100%; overflow: hidden; }

body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    letter-spacing: -0.01em;
}

.app { display: flex; height: 100vh; }

.sidebar {
    width: 300px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
}

.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }

.brand {
    padding: 28px 24px 20px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--surface);
    z-index: 10;
}

.brand-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
.brand-mark {
    width: 24px; height: 24px;
    border-radius: 6px;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 12px; font-weight: 700;
}
.brand h1 { font-size: 16px; font-weight: 600; letter-spacing: -0.02em; }
.brand p { font-size: 12px; color: var(--text-tertiary); }

.section { padding: 18px 24px; border-bottom: 1px solid var(--border); }

.section-label {
    font-size: 10px; font-weight: 600;
    color: var(--text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 12px;
    display: flex; align-items: center; gap: 6px;
}
.section-label::before {
    content: '';
    width: 4px; height: 4px;
    background: var(--text-tertiary);
    border-radius: 50%;
    opacity: 0.5;
}

/* ===== Zones ===== */
.zone-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 6px;
}

.zone-btn {
    padding: 10px 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s var(--ease);
    text-align: left;
    font-family: inherit;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
}

.zone-btn:hover {
    border-color: var(--accent);
    transform: translateY(-1px);
    box-shadow: var(--shadow-sm);
}

.zone-color-dot {
    width: 12px; height: 12px;
    border-radius: 4px;
    flex-shrink: 0;
}

.zone-btn-custom {
    padding: 10px;
    background: var(--surface);
    border: 1px dashed var(--border-strong);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s var(--ease);
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
}

.zone-btn-custom:hover {
    border-color: var(--accent);
    color: var(--text);
    background: var(--accent-soft);
}

/* ===== Preset buttons ===== */
.preset-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 12px; }
.preset-btn {
    padding: 10px 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 12px; font-weight: 500;
    cursor: pointer;
    transition: all 0.2s var(--ease);
    color: var(--text);
    font-family: inherit;
    position: relative;
    overflow: hidden;
}
.preset-btn::before {
    content: '';
    position: absolute; inset: 0;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.2s var(--ease);
}
.preset-btn span { position: relative; z-index: 1; transition: color 0.2s var(--ease); }
.preset-btn:hover { border-color: var(--border-strong); transform: translateY(-1px); }
.preset-btn.active { border-color: var(--accent); }
.preset-btn.active::before { opacity: 1; }
.preset-btn.active span { color: white; }

.input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.input-group { display: flex; flex-direction: column; gap: 6px; }
.input-group label {
    font-size: 10px;
    color: var(--text-tertiary);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
}
.input-group input {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 9px 12px;
    border-radius: 8px;
    color: var(--text);
    font-size: 13px;
    font-weight: 500;
    transition: all 0.2s var(--ease);
    font-family: inherit;
    width: 100%;
}
.input-group input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
}

.cat { margin-bottom: 16px; }
.cat:last-child { margin-bottom: 0; }
.cat-name { font-size: 11px; font-weight: 600; margin-bottom: 8px; color: var(--text-secondary); }

.furn-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }
.furn-item {
    padding: 12px 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    text-align: center;
    cursor: grab;
    transition: all 0.2s var(--ease);
    user-select: none;
    position: relative;
    overflow: hidden;
}
.furn-item::after {
    content: '+';
    position: absolute;
    top: 6px; right: 6px;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--accent);
    color: white;
    font-size: 12px; font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    transform: scale(0.5);
    transition: all 0.2s var(--ease);
}
.furn-item:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: var(--shadow);
}
.furn-item:hover::after { opacity: 1; transform: scale(1); }
.furn-item:active { transform: translateY(0) scale(0.97); }
.furn-item.dragging { opacity: 0.4; }
.furn-icon { font-size: 24px; margin-bottom: 4px; line-height: 1; transition: transform 0.2s var(--ease); }
.furn-item:hover .furn-icon { transform: scale(1.1); }
.furn-name { font-size: 11px; color: var(--text-secondary); font-weight: 500; }

.custom-furn-btn {
    margin-top: 10px;
    padding: 12px;
    background: var(--surface);
    border: 1px dashed var(--border-strong);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s var(--ease);
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
}
.custom-furn-btn:hover {
    border-color: var(--accent);
    color: var(--text);
    background: var(--accent-soft);
}

.btn {
    width: 100%;
    padding: 11px 16px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s var(--ease);
    font-family: inherit;
    letter-spacing: -0.01em;
    display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn:hover { transform: translateY(-1px); box-shadow: var(--shadow); }
.btn:active { transform: translateY(0); }

.btn-ghost {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
}
.btn-ghost:hover { background: var(--surface-hover); border-color: var(--border-strong); }

.btn-danger {
    background: var(--surface);
    color: #dc2626;
    border: 1px solid #fee;
}
.btn-danger:hover { background: #fef2f2; border-color: #fca5a5; }

.btn-primary {
    background: linear-gradient(135deg, #0a0a0a 0%, #2a2a2a 100%);
    position: relative;
    overflow: hidden;
}
.btn-primary::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    transition: left 0.6s var(--ease);
}
.btn-primary:hover::before { left: 100%; }

.btn-group { display: grid; gap: 6px; }

.selected-card {
    padding: 14px;
    background: var(--accent);
    border-radius: 10px;
    color: white;
}
.selected-name { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
.selected-size { font-size: 11px; opacity: 0.6; margin-bottom: 12px; font-weight: 500; }

.sel-name-input {
    width: 100%;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15);
    padding: 8px 10px;
    border-radius: 6px;
    color: white;
    font-size: 13px;
    font-weight: 600;
    font-family: inherit;
    margin-bottom: 8px;
    transition: all 0.15s var(--ease);
}
.sel-name-input:focus {
    outline: none;
    background: rgba(255,255,255,0.18);
    border-color: rgba(255,255,255,0.3);
}

.color-row { margin-bottom: 12px; }
.color-label {
    font-size: 10px;
    opacity: 0.6;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 600;
}
.color-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
.color-dot {
    aspect-ratio: 1;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid rgba(255,255,255,0.2);
    transition: all 0.15s var(--ease);
}
.color-dot:hover { transform: scale(1.15); border-color: white; }
.color-dot.active { border-color: white; transform: scale(1.1); }

.ctrl-row { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 6px; }
.ctrl-btn {
    padding: 8px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 6px;
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s var(--ease);
    color: white;
    font-family: inherit;
}
.ctrl-btn:hover { background: rgba(255,255,255,0.18); }

.del-btn {
    width: 100%;
    margin-top: 6px;
    padding: 9px;
    background: rgba(239, 68, 68, 0.2);
    border: 1px solid rgba(239, 68, 68, 0.3);
    border-radius: 6px;
    color: #fecaca;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s var(--ease);
    font-family: inherit;
}
.del-btn:hover { background: rgba(239, 68, 68, 0.3); }

/* ===== Canvas ===== */
.canvas-wrap {
    flex: 1;
    background: var(--bg);
    position: relative;
    overflow: hidden;
}

.canvas-wrap::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle at 1px 1px, #e0e0e0 1px, transparent 0);
    background-size: 24px 24px;
    opacity: 0.4;
    pointer-events: none;
}

.canvas-scroll {
    width: 100%;
    height: 100%;
    overflow: auto;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
}

.canvas-scroll::-webkit-scrollbar { width: 8px; height: 8px; }
.canvas-scroll::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }

#canvas {
    background: white;
    border-radius: 4px;
    box-shadow: var(--shadow-lg);
    position: relative;
    z-index: 1;
    transition: box-shadow 0.2s var(--ease);
}
#canvas.drag-over { box-shadow: 0 0 0 3px var(--accent), var(--shadow-lg); }

.toolbar {
    position: absolute;
    top: 24px; right: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 4px;
    display: flex;
    gap: 2px;
    box-shadow: var(--shadow);
    z-index: 10;
}

.tool {
    width: 36px; height: 36px;
    border: none;
    background: transparent;
    border-radius: 6px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    transition: all 0.15s var(--ease);
    color: var(--text-secondary);
    position: relative;
    font-family: inherit;
}
.tool:hover { background: var(--surface-hover); color: var(--text); }
.tool:disabled { opacity: 0.3; cursor: not-allowed; }
.tool.active { background: var(--accent); color: white; }

.tool[data-tooltip]:hover::after {
    content: attr(data-tooltip);
    position: absolute;
    top: 100%; left: 50%;
    transform: translateX(-50%);
    margin-top: 6px;
    background: var(--accent);
    color: white;
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 500;
    white-space: nowrap;
    pointer-events: none;
    z-index: 20;
}

.tool-divider { width: 1px; background: var(--border); margin: 4px 2px; }

.stats {
    position: absolute;
    top: 24px; left: 24px;
    background: var(--surface);
    padding: 12px 16px;
    border-radius: 10px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    font-size: 11px;
    z-index: 10;
    display: flex;
    gap: 16px;
}
.stat { display: flex; flex-direction: column; gap: 2px; }
.stat-label {
    color: var(--text-tertiary);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
}
.stat-value { font-weight: 600; color: var(--text); font-size: 13px; }
.stat-divider { width: 1px; background: var(--border); }

.info-bar {
    position: absolute;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface);
    padding: 10px 16px;
    border-radius: 100px;
    border: 1px solid var(--border);
    font-size: 11px;
    color: var(--text-secondary);
    box-shadow: var(--shadow);
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 6px;
    z-index: 10;
    flex-wrap: wrap;
    max-width: 90%;
    justify-content: center;
}
.info-bar kbd {
    background: var(--surface-hover);
    border: 1px solid var(--border);
    padding: 2px 6px;
    border-radius: 4px;
    font-family: 'SF Mono', monospace;
    font-size: 10px;
}

.toast {
    position: absolute;
    top: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: var(--accent);
    color: white;
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    box-shadow: var(--shadow-lg);
    opacity: 0;
    transition: all 0.3s var(--ease);
    z-index: 100;
    pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ===== Room Title ===== */
.room-title {
    position: absolute;
    top: 28px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    pointer-events: none;
}

.room-title input {
    pointer-events: auto;
    background: transparent;
    border: 1px solid transparent;
    text-align: center;
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    padding: 8px 18px;
    border-radius: 8px;
    transition: all 0.15s var(--ease);
    font-family: inherit;
    width: 260px;
    letter-spacing: -0.02em;
}

.room-title input:hover {
    background: var(--surface);
    border-color: var(--border);
}

.room-title input:focus {
    outline: none;
    background: var(--surface);
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
}

.room-title input::placeholder {
    color: var(--text-tertiary);
    font-weight: 500;
}

/* ===== Modal ===== */
.modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(6px);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s var(--ease);
}

.modal-overlay.show {
    opacity: 1;
    pointer-events: auto;
}

.modal-card {
    background: white;
    border-radius: 16px;
    padding: 28px;
    width: 380px;
    max-width: 90vw;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    transform: scale(0.95) translateY(10px);
    transition: transform 0.2s var(--ease);
}

.modal-overlay.show .modal-card {
    transform: scale(1) translateY(0);
}

.modal-title {
    font-size: 17px;
    font-weight: 700;
    margin-bottom: 4px;
    letter-spacing: -0.02em;
}

.modal-desc {
    font-size: 12px;
    color: var(--text-tertiary);
    margin-bottom: 20px;
}

.modal-body {
    display: flex;
    flex-direction: column;
    gap: 14px;
}

.modal-color-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
}

.modal-color-dot {
    aspect-ratio: 1;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid var(--border);
    transition: all 0.15s var(--ease);
}

.modal-color-dot:hover {
    transform: scale(1.15);
}

.modal-color-dot.active {
    border-color: var(--accent);
    transform: scale(1.1);
}

.modal-actions {
    display: flex;
    gap: 8px;
    margin-top: 20px;
}

.modal-actions button {
    flex: 1;
    padding: 11px;
    border-radius: 8px;
    border: 1px solid var(--border);
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.15s var(--ease);
}

.modal-cancel {
    background: var(--surface);
    color: var(--text);
}

.modal-cancel:hover {
    background: var(--surface-hover);
}

.modal-confirm {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
}

.modal-confirm:hover {
    transform: translateY(-1px);
    box-shadow: var(--shadow);
}
</style>
</head>
<body>
<div class="app">
    <aside class="sidebar">
        <div class="brand">
            <div class="brand-logo">
                <div class="brand-mark">R</div>
                <h1>Room Planner</h1>
            </div>
        </div>
        
        <div class="section">
            <div class="section-label">평수</div>
            <div class="preset-grid" id="presets">
                <button class="preset-btn" data-pyeong="6"><span>6평</span></button>
                <button class="preset-btn" data-pyeong="10"><span>10평</span></button>
                <button class="preset-btn" data-pyeong="15"><span>15평</span></button>
                <button class="preset-btn" data-pyeong="20"><span>20평</span></button>
                <button class="preset-btn" data-pyeong="25"><span>25평</span></button>
                <button class="preset-btn" data-pyeong="30"><span>30평</span></button>
            </div>
            <div class="input-row">
                <div class="input-group">
                    <label>가로 (m)</label>
                    <input type="number" id="roomW" value="4.5" step="0.1" min="2">
                </div>
                <div class="input-group">
                    <label>세로 (m)</label>
                    <input type="number" id="roomH" value="4.5" step="0.1" min="2">
                </div>
            </div>
        </div>
        
        <div class="section">
            <div class="section-label">구역</div>
            <div class="zone-grid" id="zoneGrid"></div>
            <button class="zone-btn-custom" id="customZoneBtn" style="margin-top:6px;width:100%;">
                <span>+</span><span>직접 추가</span>
            </button>
        </div>
        
        <div class="section">
            <div class="section-label">가구</div>
            <div class="cat"><div class="cat-name">침실</div><div class="furn-grid" id="cat-bedroom"></div></div>
            <div class="cat"><div class="cat-name">거실</div><div class="furn-grid" id="cat-living"></div></div>
            <div class="cat"><div class="cat-name">작업공간</div><div class="furn-grid" id="cat-office"></div></div>
            <div class="cat"><div class="cat-name">주방·욕실</div><div class="furn-grid" id="cat-kitchen"></div></div>
            <div class="cat"><div class="cat-name">기타</div><div class="furn-grid" id="cat-misc"></div></div>
            <button class="custom-furn-btn" id="customFurnBtn">
                <span>+</span><span>가구 직접 만들기</span>
            </button>
        </div>
        
        <div class="section" id="selectedSection" style="display:none;">
            <div class="section-label" id="selectedLabel">선택됨</div>
            <div class="selected-card">
                <input class="sel-name-input" id="selNameInput" type="text" placeholder="이름">
                <div class="selected-size" id="selSize">-</div>
                <div class="color-row">

<script>
'use strict';

const BASE_SCALE = 80;
const GRID = 0.5;
const HANDLE_R = 6;

const state = {
    roomW: 4.5,
    roomH: 4.5,
    title: '',
    items: [],
    zones: [],
    sel: { type: null, idx: -1 },
    showGrid: true,
    snap: true,
    zoom: 1
};

const drag = {
    moving: false,
    resizing: false,
    handle: -1,
    offX: 0, offY: 0,
    startX: 0, startY: 0,
    startW: 0, startH: 0,
    startItemX: 0, startItemY: 0
};

const history = { past: [], future: [], max: 50 };

function snapshot() {
    return JSON.stringify({ roomW: state.roomW, roomH: state.roomH, title: state.title, items: state.items, zones: state.zones });
}

function pushHistory() {
    history.past.push(snapshot());
    if (history.past.length > history.max) history.past.shift();
    history.future = [];
    updateUndoRedoButtons();
}

function applySnapshot(s) {
    const d = JSON.parse(s);
    state.roomW = d.roomW;
    state.roomH = d.roomH;
    state.title = d.title || '';
    state.items = d.items;
    state.zones = d.zones || [];
    state.sel = { type: null, idx: -1 };
    document.getElementById('roomW').value = state.roomW;
    document.getElementById('roomH').value = state.roomH;
    document.getElementById('titleInput').value = state.title;
    resizeCanvas();
    updateAll();
}

function undo() {
    if (history.past.length === 0) return;
    history.future.push(snapshot());
    applySnapshot(history.past.pop());
    updateUndoRedoButtons();
    showToast('되돌렸습니다');
}

function redo() {
    if (history.future.length === 0) return;
    history.past.push(snapshot());
    applySnapshot(history.future.pop());
    updateUndoRedoButtons();
    showToast('다시 실행');
}

function updateUndoRedoButtons() {
    document.getElementById('undoBtn').disabled = history.past.length === 0;
    document.getElementById('redoBtn').disabled = history.future.length === 0;
}

const FURNITURE = {

let toastTimeout;
function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimeout);
    toastTimeout = setTimeout(() => toast.classList.remove('show'), 2000);

// ===== 가구 라이브러리 =====
function renderFurniture() {
    Object.keys(FURNITURE).forEach(cat => {
        const container = document.getElementById('cat-' + cat);
        if (!container) return;
        FURNITURE[cat].forEach(furn => {
            const el = document.createElement('div');
            el.className = 'furn-item';
            el.draggable = true;
            el.dataset.id = furn.id;
            el.dataset.cat = cat;
            el.innerHTML = `<div class="furn-icon">${furn.icon}</div><div class="furn-name">${furn.name}</div>`;
            el.addEventListener('click', () => addItem(furn));
            el.addEventListener('dragstart', (e) => {
                e.dataTransfer.setData('text/plain', JSON.stringify({ cat, id: furn.id }));
                e.dataTransfer.effectAllowed = 'copy';
                el.classList.add('dragging');
            });
            el.addEventListener('dragend', () => el.classList.remove('dragging'));
            container.appendChild(el);
        });
    });
}

// ===== 구역 버튼 =====
function renderZones() {
    const grid = document.getElementById('zoneGrid');
    ZONE_PRESETS.forEach(zone => {
        const btn = document.createElement('button');
        btn.className = 'zone-btn';
        btn.innerHTML = `
            <div class="zone-color-dot" style="background:${zone.color}"></div>
            <span>${zone.name}</span>
        `;
        btn.addEventListener('click', () => addZone(zone.name, zone.color));
        grid.appendChild(btn);
    });
}

// ===== 색상 팔레트 =====
function renderColorPalette() {
    const grid = document.getElementById('colorGrid');
    grid.innerHTML = '';
    COLORS.forEach((c, i) => {
        const dot = document.createElement('div');
        dot.className = 'color-dot';
        dot.style.background = c.color;
        dot.style.borderColor = c.stroke + '40';
        dot.addEventListener('click', () => {
            if (state.sel.type === null) return;
            pushHistory();
            if (state.sel.type === 'item') {
                state.items[state.sel.idx].color = c.color;
                state.items[state.sel.idx].stroke = c.stroke;
            } else {
                state.zones[state.sel.idx].color = c.stroke;
            }
            updateColorActive();
            draw();
        });
        grid.appendChild(dot);
    });
}

function updateColorActive() {
    if (state.sel.type === null) return;
    let activeColor;
    if (state.sel.type === 'item') {
        activeColor = state.items[state.sel.idx].color;
    } else {
        const zoneColor = state.zones[state.sel.idx].color;
        // 구역은 stroke 색상으로 비교
        const match = COLORS.find(c => c.stroke === zoneColor);
        activeColor = match ? match.color : null;
    }
    document.querySelectorAll('.color-dot').forEach((dot, i) => {
        if (state.sel.type === 'item') {
            dot.classList.toggle('active', COLORS[i].color === activeColor);
        } else {
            dot.classList.toggle('active', COLORS[i].stroke === state.zones[state.sel.idx].color);
        }
    });
}

// ===== 추가 함수들 =====
function addItem(furn, x, y) {
    pushHistory();
    const newItem = {
        id: furn.id || 'custom',
        name: furn.name,
        w: furn.w, h: furn.h,
        x: x !== undefined ? Math.max(0, Math.min(x - furn.w/2, state.roomW - furn.w)) : (state.roomW - furn.w) / 2,
        y: y !== undefined ? Math.max(0, Math.min(y - furn.h/2, state.roomH - furn.h)) : (state.roomH - furn.h) / 2,
        r: 0, color: furn.color, stroke: furn.stroke
    };
    if (state.snap) {
        newItem.x = Math.round(newItem.x / GRID) * GRID;
        newItem.y = Math.round(newItem.y / GRID) * GRID;
        newItem.x = Math.max(0, Math.min(newItem.x, state.roomW - newItem.w));
        newItem.y = Math.max(0, Math.min(newItem.y, state.roomH - newItem.h));
    }
    state.items.push(newItem);
    state.sel = { type: 'item', idx: state.items.length - 1 };
    updateAll();
}

function addZone(name, color) {
    pushHistory();
    const defaultSize = Math.min(2, state.roomW * 0.4, state.roomH * 0.4);
    const zone = {
        name: name,
        color: color,
        x: (state.roomW - defaultSize) / 2,
        y: (state.roomH - defaultSize) / 2,
        w: defaultSize,
        h: defaultSize
    };
    state.zones.push(zone);
    state.sel = { type: 'zone', idx: state.zones.length - 1 };
    updateAll();
    showToast(`${name} 구역이 추가되었습니다`);
}

function duplicateSelected() {
    if (state.sel.type === null) return;
    pushHistory();
    if (state.sel.type === 'item') {
        const orig = state.items[state.sel.idx];
        const dup = {
            ...orig,
            x: Math.min(orig.x + 0.3, state.roomW - orig.w),
            y: Math.min(orig.y + 0.3, state.roomH - orig.h)
        };
        state.items.push(dup);
        state.sel = { type: 'item', idx: state.items.length - 1 };
    } else {
        const orig = state.zones[state.sel.idx];
        const dup = {
            ...orig,
            x: Math.min(orig.x + 0.3, state.roomW - orig.w),
            y: Math.min(orig.y + 0.3, state.roomH - orig.h)
        };
        state.zones.push(dup);
        state.sel = { type: 'zone', idx: state.zones.length - 1 };
    }
    updateAll();
    showToast('복제되었습니다');
}

function bringToFront() {
    if (state.sel.type !== 'item') return;
    pushHistory();
    const item = state.items.splice(state.sel.idx, 1)[0];
    state.items.push(item);
    state.sel = { type: 'item', idx: state.items.length - 1 };
    draw();
    showToast('맨 앞으로 이동');
}

// ===== 캔버스 =====
function getScale() { return BASE_SCALE * state.zoom; }

function resizeCanvas() {
    const padding = 60;
    const scale = getScale();
    canvas.width = state.roomW * scale + padding * 2;
    canvas.height = state.roomH * scale + padding * 2;
    draw();
}

function drawGridAndRoom(c, ox, oy, scale) {
    const rw = state.roomW * scale;
    const rh = state.roomH * scale;
    
    // 방 배경
    c.fillStyle = '#fafafa';
    c.fillRect(ox, oy, rw, rh);
    
    if (state.showGrid) {
        // 0.5m 보조선 - 더 진하게
        c.strokeStyle = '#dcdcdc';
        c.lineWidth = 1;
        for (let x = 0; x <= state.roomW + 0.001; x += GRID) {
            c.beginPath();
            c.moveTo(ox + x * scale, oy);
            c.lineTo(ox + x * scale, oy + rh);
            c.stroke();
        }
        for (let y = 0; y <= state.roomH + 0.001; y += GRID) {
            c.beginPath();
            c.moveTo(ox, oy + y * scale);
            c.lineTo(ox + rw, oy + y * scale);
            c.stroke();
        }
        
        // 1m 메인선 - 훨씬 진하게
        c.strokeStyle = '#a8a8a8';
        c.lineWidth = 1;
        for (let x = 0; x <= state.roomW + 0.001; x += 1) {
            c.beginPath();
            c.moveTo(ox + x * scale, oy);
            c.lineTo(ox + x * scale, oy + rh);
            c.stroke();
        }
        for (let y = 0; y <= state.roomH + 0.001; y += 1) {
            c.beginPath();
            c.moveTo(ox, oy + y * scale);
            c.lineTo(ox + rw, oy + y * scale);
            c.stroke();
        }
    }
    
    // 방 테두리
    c.strokeStyle = '#0a0a0a';
    c.lineWidth = 3;
    c.strokeRect(ox, oy, rw, rh);
    
    // 치수
    c.fillStyle = '#666';
    c.font = '600 11px Pretendard';
    c.textAlign = 'center';
    c.fillText(`${state.roomW}m`, ox + rw/2, oy - 12);
    c.save();
    c.translate(ox - 12, oy + rh/2);
    c.rotate(-Math.PI/2);
    c.fillText(`${state.roomH}m`, 0, 0);
    c.restore();
}

function drawZone(c, zone, selected, ox, oy, scale) {
    const x = ox + zone.x * scale;
    const y = oy + zone.y * scale;
    const w = zone.w * scale;
    const h = zone.h * scale;
    
    // 반투명 배경
    c.fillStyle = zone.color + '15'; // 8% alpha
    c.fillRect(x, y, w, h);
    
    // 점선 테두리
    c.strokeStyle = zone.color;
    c.lineWidth = selected ? 2.5 : 1.5;
    c.setLineDash(selected ? [10, 4] : [6, 4]);
    c.strokeRect(x, y, w, h);
    c.setLineDash([]);
    
    // 라벨 배경 (작은 태그 스타일)
    c.font = '700 12px Pretendard';
    const labelText = zone.name;
    const metrics = c.measureText(labelText);
    const padX = 8, padY = 5;
    const labelW = metrics.width + padX * 2;
    const labelH = 22;
    const labelX = x + 8;
    const labelY = y + 8;
    
    c.fillStyle = zone.color;
    roundRectPath(c, labelX, labelY, labelW, labelH, 5);
    c.fill();
    
    c.fillStyle = 'white';
    c.textAlign = 'left';
    c.textBaseline = 'middle';
    c.fillText(labelText, labelX + padX, labelY + labelH/2);
    
    // 치수 (큰 구역만 표시)
    if (w > 100 && h > 60) {
        c.font = '500 10px Pretendard';
        c.fillStyle = zone.color + 'cc';
        c.textAlign = 'center';
        c.textBaseline = 'middle';
        c.fillText(`${zone.w.toFixed(1)} × ${zone.h.toFixed(1)}m`, x + w/2, y + h - 16);
    }
}

function drawItem(c, item, selected, ox, oy, scale) {
    c.save();
    const cx = ox + (item.x + item.w/2) * scale;
    const cy = oy + (item.y + item.h/2) * scale;
    c.translate(cx, cy);
    c.rotate(item.r * Math.PI / 180);
    
    const w = item.w * scale;
    const h = item.h * scale;
    
    c.shadowColor = selected ? 'rgba(10,10,10,0.15)' : 'rgba(0,0,0,0.06)';
    c.shadowBlur = selected ? 16 : 8;
    c.shadowOffsetY = selected ? 4 : 2;
    
    c.fillStyle = item.color;
    roundRectPath(c, -w/2, -h/2, w, h, 4);
    c.fill();
    
    c.shadowColor = 'transparent';
    c.strokeStyle = selected ? '#0a0a0a' : item.stroke;
    c.lineWidth = selected ? 2.5 : 1.5;
    roundRectPath(c, -w/2, -h/2, w, h, 4);
    c.stroke();
    
    c.fillStyle = selected ? '#0a0a0a' : item.stroke;
    c.font = '600 11px Pretendard';
    c.textAlign = 'center';
    c.textBaseline = 'middle';
    
    if (Math.min(w, h) > 40) {
        c.fillText(item.name, 0, -4);
        c.font = '500 9px Pretendard';
        c.fillStyle = selected ? '#666' : item.stroke + '99';
        c.fillText(`${item.w.toFixed(1)} × ${item.h.toFixed(1)}m`, 0, 8);
    } else if (Math.max(w, h) > 50 && Math.min(w, h) > 12) {
        // 얇은 가구 (창문, 문 등)에도 이름 표시
        c.font = '600 9px Pretendard';
        c.fillText(item.name, 0, 0);
    }
    c.restore();
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const scale = getScale();
    const ox = 60, oy = 60;
    
    drawGridAndRoom(ctx, ox, oy, scale);
    
    // 구역 (가구 아래)
    state.zones.forEach((zone, i) => {
        drawZone(ctx, zone, state.sel.type === 'zone' && state.sel.idx === i, ox, oy, scale);
    });
    
    // 가구
    state.items.forEach((item, i) => {
        drawItem(ctx, item, state.sel.type === 'item' && state.sel.idx === i, ox, oy, scale);
    });
    
    // 핸들
    if (state.sel.type !== null) {
        const obj = getSelectedObject();
        if (obj) {
            const corners = getCorners(obj, ox, oy, state.sel.type === 'item');
            corners.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, HANDLE_R, 0, Math.PI * 2);
                ctx.fillStyle = '#fff';
                ctx.fill();
                ctx.strokeStyle = '#0a0a0a';
                ctx.lineWidth = 2;
                ctx.stroke();
            });
        }
    }
}

function roundRectPath(c, x, y, w, h, r) {
    r = Math.min(r, w/2, h/2);
    c.beginPath();
    c.moveTo(x + r, y);
    c.lineTo(x + w - r, y);
    c.quadraticCurveTo(x + w, y, x + w, y + r);
    c.lineTo(x + w, y + h - r);
    c.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    c.lineTo(x + r, y + h);
    c.quadraticCurveTo(x, y + h, x, y + h - r);
    c.lineTo(x, y + r);
    c.quadraticCurveTo(x, y, x + r, y);
    c.closePath();
}

function getSelectedObject() {
    if (state.sel.type === 'item') return state.items[state.sel.idx];
    if (state.sel.type === 'zone') return state.zones[state.sel.idx];
    return null;
}

function getCorners(obj, ox, oy, isItem) {
    const scale = getScale();
    const cx = obj.x + obj.w/2;
    const cy = obj.y + obj.h/2;
    const r = isItem ? (obj.r || 0) : 0;
    const cos = Math.cos(r * Math.PI / 180);
    const sin = Math.sin(r * Math.PI / 180);
    const corners = [
        { dx: -obj.w/2, dy: -obj.h/2 },
        { dx:  obj.w/2, dy: -obj.h/2 },
        { dx:  obj.w/2, dy:  obj.h/2 },
        { dx: -obj.w/2, dy:  obj.h/2 }
    ];
    return corners.map(p => ({
        x: ox + (cx + p.dx * cos - p.dy * sin) * scale,
        y: oy + (cy + p.dx * sin + p.dy * cos) * scale
    }));
}

function getMouse(e) {
    const scale = getScale();
    const rect = canvas.getBoundingClientRect();
    return {
        x: (e.clientX - rect.left - 60) / scale,
        y: (e.clientY - rect.top - 60) / scale,
        pixelX: e.clientX - rect.left,
        pixelY: e.clientY - rect.top
    };
}

function hitTestItem(mx, my, item) {
    const cx = item.x + item.w/2;
    const cy = item.y + item.h/2;
    const dx = mx - cx;
    const dy = my - cy;
    const r = item.r || 0;
    const cos = Math.cos(-r * Math.PI / 180);
    const sin = Math.sin(-r * Math.PI / 180);
    const lx = dx * cos - dy * sin;
    const ly = dx * sin + dy * cos;
    return Math.abs(lx) <= item.w/2 && Math.abs(ly) <= item.h/2;
}

function hitTestZone(mx, my, zone) {
    return mx >= zone.x && mx <= zone.x + zone.w &&
           my >= zone.y && my <= zone.y + zone.h;
}

function hitTestHandle(mouse, obj, ox, oy, isItem) {
    const corners = getCorners(obj, ox, oy, isItem);
    for (let i = 0; i < corners.length; i++) {
        const dx = mouse.pixelX - corners[i].x;
        const dy = mouse.pixelY - corners[i].y;
        if (Math.sqrt(dx * dx + dy * dy) < HANDLE_R + 4) return i;
    }
    return -1;
}

// ===== 벽 스냅 (버그 수정) =====
function snapPosition(val, max, itemSize) {
    if (!state.snap) return Math.max(0, Math.min(val, max - itemSize));
    
    const gridSnap = Math.round(val / GRID) * GRID;
    const wallTop = 0;
    const wallBottom = max - itemSize;
    
    // 가장 가까운 후보 선택
    const candidates = [
        { val: gridSnap, dist: Math.abs(val - gridSnap) },
        { val: wallTop, dist: Math.abs(val - wallTop) },
        { val: wallBottom, dist: Math.abs(val - wallBottom) }
    ];
    
    let best = candidates[0];
    for (const c of candidates) {
        if (c.dist < best.dist) best = c;
    }
    
    return Math.max(0, Math.min(best.val, max - itemSize));
}

// ===== 회전을 고려한 스냅 (회전된 가구의 시각적 bbox 기준으로 스냅) =====
function snapWithRotation(obj, proposedX, proposedY) {
    const isItem = state.sel.type === 'item';
    const r = isItem ? (obj.r || 0) : 0;
    const rad = r * Math.PI / 180;
    const cosR = Math.abs(Math.cos(rad));
    const sinR = Math.abs(Math.sin(rad));
    
    // 회전 후 실제 시각적 바운딩 박스 크기
    const bboxW = obj.w * cosR + obj.h * sinR;
    const bboxH = obj.w * sinR + obj.h * cosR;
    
    // 가구의 중심 좌표 (회전해도 중심은 그대로)
    const centerX = proposedX + obj.w / 2;
    const centerY = proposedY + obj.h / 2;
    
    // 시각적 bbox의 좌상단
    const bboxLeft = centerX - bboxW / 2;
    const bboxTop = centerY - bboxH / 2;
    
    // bbox 가장자리를 기준으로 스냅
    const newBboxLeft = snapPosition(bboxLeft, state.roomW, bboxW);
    const newBboxTop = snapPosition(bboxTop, state.roomH, bboxH);
    
    // 다시 item.x, item.y로 변환 (회전된 경우 음수일 수 있음 - 정상)
    const newCenterX = newBboxLeft + bboxW / 2;
    const newCenterY = newBboxTop + bboxH / 2;
    
    return {
        x: newCenterX - obj.w / 2,
        y: newCenterY - obj.h / 2
    };
}

// ===== 마우스 이벤트 =====
canvas.addEventListener('mousedown', (e) => {
    const m = getMouse(e);
    
    // 1. 현재 선택 객체의 핸들 체크
    if (state.sel.type !== null) {
        const obj = getSelectedObject();
        const isItem = state.sel.type === 'item';
        const h = hitTestHandle(m, obj, 60, 60, isItem);
        if (h >= 0) {
            pushHistory();
            drag.resizing = true;
            drag.handle = h;
            drag.startX = m.x; drag.startY = m.y;
            drag.startW = obj.w; drag.startH = obj.h;
            drag.startItemX = obj.x; drag.startItemY = obj.y;
            return;
        }
    }
    
    // 2. 가구 체크 (위에서부터)
    for (let i = state.items.length - 1; i >= 0; i--) {
        if (hitTestItem(m.x, m.y, state.items[i])) {
            if (state.sel.type !== 'item' || state.sel.idx !== i) {
                state.sel = { type: 'item', idx: i };
                updateSelectedPanel();
            }
            pushHistory();
            drag.moving = true;
            drag.offX = m.x - state.items[i].x;
            drag.offY = m.y - state.items[i].y;
            draw();
            canvas.style.cursor = 'grabbing';
            return;
        }
    }
    
    // 3. 구역 체크
    for (let i = state.zones.length - 1; i >= 0; i--) {
        if (hitTestZone(m.x, m.y, state.zones[i])) {
            if (state.sel.type !== 'zone' || state.sel.idx !== i) {
                state.sel = { type: 'zone', idx: i };
                updateSelectedPanel();
            }
            pushHistory();
            drag.moving = true;
            drag.offX = m.x - state.zones[i].x;
            drag.offY = m.y - state.zones[i].y;
            draw();
            canvas.style.cursor = 'grabbing';
            return;
        }
    }
    
    // 4. 빈 공간 - 선택 해제
    state.sel = { type: null, idx: -1 };
    updateSelectedPanel();
    draw();
});

canvas.addEventListener('mousemove', (e) => {
    const m = getMouse(e);
    
    if (drag.moving && state.sel.type !== null) {
        const obj = getSelectedObject();
        const nx = m.x - drag.offX;
        const ny = m.y - drag.offY;
        
        // 회전을 고려한 벽 스냅
        const pos = snapWithRotation(obj, nx, ny);
        obj.x = pos.x;
        obj.y = pos.y;
        draw();
        return;
    }
    
    if (drag.resizing && state.sel.type !== null) {
        const obj = getSelectedObject();
        
        // 회전 각도 (구역은 회전 없음)
        const isItem = state.sel.type === 'item';
        const r = isItem ? (obj.r || 0) : 0;
        const rad = r * Math.PI / 180;
        const cos = Math.cos(rad);
        const sin = Math.sin(rad);
        
        // 시작 시점의 중심 좌표
        const c0x = drag.startItemX + drag.startW / 2;
        const c0y = drag.startItemY + drag.startH / 2;
        
        // 반대편 모서리의 로컬 좌표 (드래그 중에 고정되어야 함)
        const oppIdx = (drag.handle + 2) % 4;
        const localOffsets = [
            [-drag.startW/2, -drag.startH/2],
            [ drag.startW/2, -drag.startH/2],
            [ drag.startW/2,  drag.startH/2],
            [-drag.startW/2,  drag.startH/2]
        ];
        const oppLocalX = localOffsets[oppIdx][0];
        const oppLocalY = localOffsets[oppIdx][1];
        
        // 반대편 모서리의 월드 좌표 (회전 적용)
        const oppWorldX = c0x + oppLocalX * cos - oppLocalY * sin;
        const oppWorldY = c0y + oppLocalX * sin + oppLocalY * cos;
        
        // 마우스가 반대편 모서리로부터 떨어진 거리 (월드 → 로컬 변환)
        const dxWorld = m.x - oppWorldX;
        const dyWorld = m.y - oppWorldY;
        const dxLocal = dxWorld * cos + dyWorld * sin;
        const dyLocal = -dxWorld * sin + dyWorld * cos;
        
        // 새 크기 (최소 0.2m)
        const newW = Math.max(0.2, Math.abs(dxLocal));
        const newH = Math.max(0.2, Math.abs(dyLocal));
        
        // 새 위치: 반대편 모서리가 월드 좌표에서 고정되도록 계산
        const signX = oppLocalX >= 0 ? 1 : -1;
        const signY = oppLocalY >= 0 ? 1 : -1;
        const newOppOffsetX = signX * newW / 2;
        const newOppOffsetY = signY * newH / 2;
        const newCenterX = oppWorldX - (newOppOffsetX * cos - newOppOffsetY * sin);
        const newCenterY = oppWorldY - (newOppOffsetX * sin + newOppOffsetY * cos);
        
        obj.w = newW;
        obj.h = newH;
        obj.x = newCenterX - newW / 2;
        obj.y = newCenterY - newH / 2;
        
        updateSelectedPanel();
        draw();
        return;
    }
    
    // 커서 변경
    let cursor = 'default';
    if (state.sel.type !== null) {
        const obj = getSelectedObject();
        const isItem = state.sel.type === 'item';
        const h = hitTestHandle(m, obj, 60, 60, isItem);
        if (h >= 0) cursor = (h === 0 || h === 2) ? 'nwse-resize' : 'nesw-resize';
    }
    if (cursor === 'default') {
        for (let i = state.items.length - 1; i >= 0; i--) {
            if (hitTestItem(m.x, m.y, state.items[i])) { cursor = 'grab'; break; }
        }
        if (cursor === 'default') {
            for (let i = state.zones.length - 1; i >= 0; i--) {
                if (hitTestZone(m.x, m.y, state.zones[i])) { cursor = 'grab'; break; }
            }
        }
    }
    canvas.style.cursor = cursor;
});

canvas.addEventListener('mouseup', () => {
    drag.moving = false;
    drag.resizing = false;
    canvas.style.cursor = 'default';
});

document.getElementById('canvasScroll').addEventListener('wheel', (e) => {
    if (!e.ctrlKey && !e.metaKey) return;
    e.preventDefault();
    setZoom(state.zoom + (e.deltaY > 0 ? -0.1 : 0.1));
}, { passive: false });

canvas.addEventListener('dragover', (e) => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'copy';
    canvas.classList.add('drag-over');
});
canvas.addEventListener('dragleave', () => canvas.classList.remove('drag-over'));
canvas.addEventListener('drop', (e) => {
    e.preventDefault();
    canvas.classList.remove('drag-over');
    try {
        const data = JSON.parse(e.dataTransfer.getData('text/plain'));
        const furn = FURNITURE[data.cat].find(f => f.id === data.id);
        if (furn) {
            const m = getMouse(e);
            addItem(furn, m.x, m.y);
        }
    } catch (err) {}
});

document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT') return;
    if (document.getElementById('modal').classList.contains('show')) return;
    
    if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) { e.preventDefault(); undo(); return; }
    if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.key === 'z' && e.shiftKey))) { e.preventDefault(); redo(); return; }
    if ((e.ctrlKey || e.metaKey) && e.key === 'd') { e.preventDefault(); duplicateSelected(); return; }
    if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); exportImage(); return; }
    
    if (state.sel.type === null) return;
    if (e.key === 'r' || e.key === 'R') {
        if (state.sel.type === 'item') rotate(15);
    } else if (e.key === 'Delete' || e.key === 'Backspace') deleteSelected();
    else if (e.key === 'ArrowLeft') { e.preventDefault(); moveSelected(-GRID, 0); }
    else if (e.key === 'ArrowRight') { e.preventDefault(); moveSelected(GRID, 0); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); moveSelected(0, -GRID); }
    else if (e.key === 'ArrowDown') { e.preventDefault(); moveSelected(0, GRID); }
});

function moveSelected(dx, dy) {
    if (state.sel.type === null) return;
    const obj = getSelectedObject();
    const pos = snapWithRotation(obj, obj.x + dx, obj.y + dy);
    obj.x = pos.x;
    obj.y = pos.y;
    draw();
}

function rotate(deg) {
    if (state.sel.type !== 'item') return;
    pushHistory();
    state.items[state.sel.idx].r = (state.items[state.sel.idx].r + deg) % 360;
    draw();
}

function deleteSelected() {
    if (state.sel.type === null) return;
    pushHistory();
    if (state.sel.type === 'item') state.items.splice(state.sel.idx, 1);
    else state.zones.splice(state.sel.idx, 1);
    state.sel = { type: null, idx: -1 };
    updateAll();
}

function setZoom(z) {
    state.zoom = Math.max(0.3, Math.min(3, z));
    resizeCanvas();
}

// ===== UI 업데이트 =====
function updateSelectedPanel() {
    const section = document.getElementById('selectedSection');
    const label = document.getElementById('selectedLabel');
    const nameInput = document.getElementById('selNameInput');
    const sizeEl = document.getElementById('selSize');
    const rotRow1 = document.getElementById('rotRow1');
    const rotRow2 = document.getElementById('rotRow2');
    const frontBtn = document.getElementById('frontBtn');
    
    if (state.sel.type === null) {
        section.style.display = 'none';
        return;
    }
    
    section.style.display = 'block';
    const obj = getSelectedObject();
    
    if (state.sel.type === 'item') {
        label.textContent = '선택된 가구';
        nameInput.value = obj.name;
        sizeEl.textContent = `${obj.w.toFixed(1)}m × ${obj.h.toFixed(1)}m  ·  ${obj.r}°`;
        rotRow1.style.display = 'grid';
        rotRow2.style.display = 'grid';
        frontBtn.style.display = 'block';
    } else {
        label.textContent = '선택된 구역';
        nameInput.value = obj.name;
        sizeEl.textContent = `${obj.w.toFixed(1)}m × ${obj.h.toFixed(1)}m`;
        rotRow1.style.display = 'none';
        rotRow2.style.display = 'none';
        frontBtn.style.display = 'none';
    }
    
    updateColorActive();
}

function updateStats() {
    const area = (state.roomW * state.roomH).toFixed(1);
    const pyeong = (state.roomW * state.roomH / 3.3058).toFixed(1);
    document.getElementById('statArea').textContent = `${area}㎡`;
    document.getElementById('statPyeong').textContent = `${pyeong}평`;
    document.getElementById('statCount').textContent = `${state.items.length}개`;
}

function updateAll() {
    updateSelectedPanel();
    updateStats();
    draw();
}

function setPyeong(pyeong) {
    pushHistory();
    const area = pyeong * 3.3058;
    const side = Math.sqrt(area);
    state.roomW = Math.round(side * 10) / 10;
    state.roomH = Math.round(side * 10) / 10;
    document.getElementById('roomW').value = state.roomW;
    document.getElementById('roomH').value = state.roomH;
    resizeCanvas();
    updateStats();
}

// ===== 모달 =====
let modalMode = 'furniture'; // 'furniture' | 'zone'
let modalSelectedColor = COLORS[0];

function renderModalColors() {
    const grid = document.getElementById('modalColors');
    grid.innerHTML = '';
    COLORS.forEach((c, i) => {
        const dot = document.createElement('div');
        dot.className = 'modal-color-dot' + (i === 0 ? ' active' : '');
        dot.style.background = c.color;
        dot.addEventListener('click', () => {
            modalSelectedColor = c;
            document.querySelectorAll('.modal-color-dot').forEach((d, j) => {
                d.classList.toggle('active', i === j);
            });
        });
        grid.appendChild(dot);
    });
    modalSelectedColor = COLORS[0];
}

function openModal(mode) {
    modalMode = mode;
    const modal = document.getElementById('modal');
    const title = document.getElementById('modalTitle');
    const desc = document.getElementById('modalDesc');
    const nameInput = document.getElementById('modalName');
    const wInput = document.getElementById('modalW');
    const hInput = document.getElementById('modalH');
    
    if (mode === 'furniture') {
        title.textContent = '가구 직접 만들기';
        desc.textContent = '원하는 이름과 크기로 가구를 만들 수 있어요';
        nameInput.placeholder = '예: 피아노';
        wInput.value = 1.0;
        hInput.value = 1.0;
    } else {
        title.textContent = '구역 직접 만들기';
        desc.textContent = '원하는 이름과 색상으로 구역을 만들어보세요';
        nameInput.placeholder = '예: 베란다';
        wInput.value = 2.0;
        hInput.value = 2.0;
    }
    
    nameInput.value = '';
    renderModalColors();
    modal.classList.add('show');
    setTimeout(() => nameInput.focus(), 100);
}

function closeModal() {
    document.getElementById('modal').classList.remove('show');
}

function confirmModal() {
    const name = document.getElementById('modalName').value.trim();
    const w = parseFloat(document.getElementById('modalW').value);
    const h = parseFloat(document.getElementById('modalH').value);
    
    if (!name) {
        document.getElementById('modalName').focus();
        return;
    }
    if (!w || w < 0.1 || !h || h < 0.1) {
        showToast('크기를 올바르게 입력해주세요');
        return;
    }
    
    if (modalMode === 'furniture') {
        addItem({
            name: name,
            w: w, h: h,
            color: modalSelectedColor.color,
            stroke: modalSelectedColor.stroke
        });
        showToast(`'${name}' 가구가 추가되었습니다`);
    } else {
        pushHistory();
        const zone = {
            name: name,
            color: modalSelectedColor.stroke,
            x: (state.roomW - w) / 2,
            y: (state.roomH - h) / 2,
            w: w, h: h
        };
        state.zones.push(zone);
        state.sel = { type: 'zone', idx: state.zones.length - 1 };
        updateAll();
        showToast(`'${name}' 구역이 추가되었습니다`);
    }
    
    closeModal();
}

// ===== 이미지 저장 =====
function exportImage() {
    const exportScale = 2;
    const padding = 80;
    const scale = BASE_SCALE;
    
    const w = state.roomW * scale + padding * 2;
    const h = state.roomH * scale + padding * 2 + 50;
    
    const exportCanvas = document.createElement('canvas');
    exportCanvas.width = w * exportScale;
    exportCanvas.height = h * exportScale;
    const exCtx = exportCanvas.getContext('2d');
    exCtx.scale(exportScale, exportScale);
    
    exCtx.fillStyle = '#ffffff';
    exCtx.fillRect(0, 0, w, h);
    
    const ox = padding;
    const oy = padding;
    
    drawGridAndRoom(exCtx, ox, oy, scale);
    state.zones.forEach(zone => drawZone(exCtx, zone, false, ox, oy, scale));
    state.items.forEach(item => drawItem(exCtx, item, false, ox, oy, scale));
    
    // 제목
    if (state.title) {
        exCtx.fillStyle = '#0a0a0a';
        exCtx.font = '700 18px Pretendard';
        exCtx.textAlign = 'center';
        exCtx.textBaseline = 'middle';
        exCtx.fillText(state.title, w / 2, padding / 2 + 4);
    }
    
    // 푸터
    exCtx.fillStyle = '#aaa';
    exCtx.font = '500 11px Pretendard';
    exCtx.textAlign = 'left';
    exCtx.fillText(
        `${state.roomW}m × ${state.roomH}m  ·  ${(state.roomW * state.roomH).toFixed(1)}㎡  ·  ${(state.roomW * state.roomH / 3.3058).toFixed(1)}평  ·  가구 ${state.items.length}개  ·  구역 ${state.zones.length}개`,
        padding, h - 25
    );
    exCtx.textAlign = 'right';
    exCtx.fillText('Room Planner', w - padding, h - 25);
    
    exportCanvas.toBlob((blob) => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        const date = new Date();
        const dateStr = `${date.getFullYear()}${String(date.getMonth()+1).padStart(2,'0')}${String(date.getDate()).padStart(2,'0')}`;
        const safeTitle = state.title ? state.title.replace(/[\\/:*?"<>|]/g, '').trim() : '';
        a.href = url;
        a.download = safeTitle ? `${safeTitle}-${dateStr}.png` : `room-${dateStr}.png`;
        a.click();
        URL.revokeObjectURL(url);
        showToast('이미지가 저장되었습니다 ✓');
    }, 'image/png');
}

// ===== 이벤트 바인딩 =====
function bindEvents() {
    // 룸 제목
    const titleInput = document.getElementById('titleInput');
    titleInput.addEventListener('input', (e) => {
        state.title = e.target.value;
    });
    titleInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') e.target.blur();
    });
    
    document.querySelectorAll('.preset-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            setPyeong(parseInt(btn.dataset.pyeong));
        });
    });
    
    document.getElementById('roomW').addEventListener('input', (e) => {
        state.roomW = parseFloat(e.target.value) || 2;
        document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
        resizeCanvas();
        updateStats();
    });
    
    document.getElementById('roomH').addEventListener('input', (e) => {
        state.roomH = parseFloat(e.target.value) || 2;
        document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
        resizeCanvas();
        updateStats();
    });
    
    // 선택 패널
    document.getElementById('selNameInput').addEventListener('input', (e) => {
        if (state.sel.type === null) return;
        const obj = getSelectedObject();
        obj.name = e.target.value;
        draw();
    });
    
    document.getElementById('selNameInput').addEventListener('blur', () => {
        if (state.sel.type === null) return;
        pushHistory();
    });
    
    document.getElementById('rotL15').addEventListener('click', () => rotate(-15));
    document.getElementById('rotR15').addEventListener('click', () => rotate(15));
    document.getElementById('rotL90').addEventListener('click', () => rotate(-90));
    document.getElementById('rotR90').addEventListener('click', () => rotate(90));
    document.getElementById('delBtn').addEventListener('click', deleteSelected);
    document.getElementById('dupBtn').addEventListener('click', duplicateSelected);
    document.getElementById('frontBtn').addEventListener('click', bringToFront);
    
    document.getElementById('undoBtn').addEventListener('click', undo);
    document.getElementById('redoBtn').addEventListener('click', redo);
    
    document.getElementById('toolGrid').addEventListener('click', (e) => {
        state.showGrid = !state.showGrid;
        e.currentTarget.classList.toggle('active', state.showGrid);
        draw();
    });
    document.getElementById('toolGrid').classList.toggle('active', state.showGrid);
    
    document.getElementById('toolSnap').addEventListener('click', (e) => {
        state.snap = !state.snap;
        e.currentTarget.classList.toggle('active', state.snap);
    });
    document.getElementById('toolSnap').classList.toggle('active', state.snap);
    
    document.getElementById('zoomIn').addEventListener('click', () => setZoom(state.zoom + 0.2));
    document.getElementById('zoomOut').addEventListener('click', () => setZoom(state.zoom - 0.2));
    document.getElementById('zoomFit').addEventListener('click', () => setZoom(1));
    
    document.getElementById('exportBtn').addEventListener('click', exportImage);
    
    // 커스텀 가구 / 구역
    document.getElementById('customFurnBtn').addEventListener('click', () => openModal('furniture'));
    document.getElementById('customZoneBtn').addEventListener('click', () => openModal('zone'));
    document.getElementById('modalCancel').addEventListener('click', closeModal);
    document.getElementById('modalConfirm').addEventListener('click', confirmModal);
    document.getElementById('modal').addEventListener('click', (e) => {
        if (e.target.id === 'modal') closeModal();
    });
    document.getElementById('modalName').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') confirmModal();
        if (e.key === 'Escape') closeModal();
    });
    
    document.getElementById('loadBtn').addEventListener('click', () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.json';
        input.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    pushHistory();
                    const data = JSON.parse(ev.target.result);
                    state.roomW = data.roomW;
                    state.roomH = data.roomH;
                    state.title = data.title || '';
                    state.items = data.items || [];
                    state.zones = data.zones || [];
                    state.sel = { type: null, idx: -1 };
                    document.getElementById('roomW').value = state.roomW;
                    document.getElementById('roomH').value = state.roomH;
                    document.getElementById('titleInput').value = state.title;
                    resizeCanvas();
                    updateAll();
                    showToast('불러왔습니다');
                } catch (err) {
                    alert('파일을 불러올 수 없습니다.');
                }
            };
            reader.readAsText(file);
        });
        input.click();
    });
    
    document.getElementById('resetBtn').addEventListener('click', () => {
        if (state.items.length === 0 && state.zones.length === 0) return;
        if (confirm('모든 가구와 구역을 삭제하시겠습니까?')) {
            pushHistory();
            state.items = [];
            state.zones = [];
            state.sel = { type: null, idx: -1 };
            updateAll();
            showToast('초기화되었습니다');
        }
    });
}

function init() {
    renderZones();
    renderFurniture();
    renderColorPalette();
    bindEvents();
    resizeCanvas();
    updateStats();
    updateUndoRedoButtons();
}

init();
</script>
